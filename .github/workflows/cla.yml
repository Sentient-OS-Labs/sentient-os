# CLA enforcement — contributor-assistant (self-hosted GitHub Action, no external service).
# On every PR from a non-allowlisted author: posts a comment asking them to sign CLA.md
# (by replying "I have read the CLA Document and I hereby sign the CLA"), blocks the PR
# status until signed, and records signatures on the `cla-signatures` branch.

name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/Sentient-OS-Labs/sentient-os/blob/main/CLA.md"
          branch: "cla-signatures"
          # Founders + bots don't need to sign.
          allowlist: theJayTea,aryamangoenka,AdityaHemanthVellanki,dependabot[bot],*[bot]
